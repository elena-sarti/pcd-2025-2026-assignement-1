plugins {
    id 'java'
}

group = 'pcd'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(23)
    }
}

dependencies {
    implementation 'io.reactivex.rxjava3:rxjava:3.1.8'
    implementation 'org.reactivestreams:reactive-streams:1.0.4'
}