pekko {
  loglevel = debug

  remote.artery {
    transport = tcp
    canonical.hostname = ${clustering.ip}
    canonical.port = ${clustering.port}
  }

  cluster {
    seed-nodes = [
      "pekko://"${clustering.cluster.name}"@"${clustering.seed-ip}":"${clustering.seed-port}
    ]
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    
    sharding {
      # The extension creates a so called coordinator that manages the distribution of shards.
      # By default it runs as a Cluster Singleton.
      # Setting this to ensure idle entities are passivated after a while to save memory.
      passivation {
        default-idle-strategy {
          idle-entity.timeout = 2 minutes
        }
      }
    }
  }

  actor {
    provider = cluster
    serialization-bindings {
      "scala.CborSerializable" = jackson-cbor
    }
  }
}

clustering {
  ip = "127.0.0.1"
  ip = ${?CLUSTER_IP}
  port = 1600
  port = ${?CLUSTER_PORT}
  seed-ip = "127.0.0.1"
  seed-ip = ${?CLUSTER_IP}
  seed-ip = ${?SEED_PORT_1600_TCP_ADDR}
  seed-port = 1600
  seed-port = ${?SEED_PORT_1600_TCP_PORT}
  cluster.name = "ClusterSystem"
}
