services:
  seed:
    build:
      context: ../
      dockerfile: docker/Dockerfile.sharding
    ports:
      - "1600:1600"
    environment:
      - CLUSTER_IP=seed
      - CLUSTER_PORT=1600
      - SEED_PORT_1600_TCP_ADDR=seed

  node1:
    build:
      context: ../
      dockerfile: docker/Dockerfile.sharding
    environment:
      - CLUSTER_IP=node1
      - CLUSTER_PORT=2552
      - SEED_PORT_1600_TCP_ADDR=seed

  node2:
    build:
      context: ../
      dockerfile: docker/Dockerfile.sharding
    environment:
      - CLUSTER_IP=node2
      - CLUSTER_PORT=2553
      - SEED_PORT_1600_TCP_ADDR=seed